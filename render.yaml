services:
  - type: web
    name: news-fundamentals-technicals-stock-scanner-v2-1
    env: python
    plan: starter
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT --workers 1
    disk:
      name: scanner-data
      mountPath: /var/data
      sizeGB: 5
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.9
      - key: APP_ENV
        value: production
      - key: APP_VERSION
        value: v2.1.0
      - key: BUILD_ID
        value: v2.1.0-replay-discrimination-hardening
      - key: BUILD_TIMESTAMP_UTC
        value: 2026-05-10T19:00:00+00:00
      - key: ARTIFACT_SCHEMA_VERSION
        value: 2026-05-11-v2.1
      - key: DATA_DIR
        value: /var/data
      - key: DATABASE_PATH
        value: /var/data/scanner.db
      - key: ARTIFACTS_DIR
        value: /var/data/artifacts
      - key: SETTINGS_PATH
        value: /var/data/settings.json
      - key: RUNTIME_STATUS_PATH
        value: /var/data/runtime_status.json
      - key: UNIVERSE_CACHE_PATH
        value: /var/data/universe_cache.json
      - key: DATA_PROVIDER
        value: yfinance
      - key: DEMO_MODE
        value: false
      - key: SCAN_TICKER_LIMIT
        value: 500
      - key: ENRICHMENT_LIMIT
        value: 120
      - key: SHORTLIST_SIZE
        value: 20
      - key: LOOKBACK_DAYS
        value: 320
      - key: NEWS_LOOKBACK_DAYS
        value: 7
      - key: MAX_WORKERS
        value: 8
      - key: STRUCTURAL_WEIGHT
        value: 0.35
      - key: CATALYST_WEIGHT
        value: 0.30
      - key: TIMING_WEIGHT
        value: 0.35
      - key: YFINANCE_BULK_CHUNK_SIZE
        value: 100

      - key: STALE_PRICE_MAX_AGE_DAYS
        value: 3
      - key: STALE_NEWS_MAX_AGE_DAYS
        value: 7
      - key: MIN_CORE_FEATURE_COVERAGE_PCT
        value: 70
      - key: MIN_PRICE_HISTORY_COVERAGE_PCT
        value: 90
      - key: OUTCOME_TARGET_UP_PCT
        value: 0.05
      - key: OUTCOME_STOP_DOWN_PCT
        value: 0.03
      - key: OUTCOME_HORIZON_DAYS
        value: 20
      - key: OUTCOME_RECHECK_LOOKBACK_DAYS
        value: 80
      - key: REPLAY_TICKER_LIMIT
        value: 120
      - key: REPLAY_MAX_SNAPSHOTS
        value: 80
      - key: REPLAY_HISTORY_DAYS
        value: 420
      - key: REPLAY_WARMUP_DAYS
        value: 220
      - key: REPLAY_STEP_DAYS
        value: 1
      - key: REPLAY_MIN_ROWS_PER_SNAPSHOT
        value: 30
      - key: REPLAY_DEFAULT_MODE
        value: timing_only
      - key: CALIBRATION_MIN_OBSERVATIONS
        value: 250
      - key: CALIBRATION_MIN_BAND_SIZE
        value: 25
      - key: REPLAY_MONOTONICITY_MIN_CORRELATION
        value: 0.05
      - key: REPLAY_MIN_TOP_DECILE_LIFT
        value: 0.03
      - key: REPLAY_MIN_TOP_QUINTILE_LIFT
        value: 0.01
      - key: REPLAY_MAX_MONOTONICITY_VIOLATIONS
        value: 2
      - key: REPLAY_MONOTONICITY_TOLERANCE
        value: 0.01
      - key: REPLAY_MIN_REGIME_SLICE_OBSERVATIONS
        value: 150

