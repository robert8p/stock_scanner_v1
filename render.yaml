services:
  - type: web
    name: news-fundamentals-technicals-stock-scanner-v1
    env: python
    plan: starter
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT --workers 1
    disk:
      name: scanner-data
      mountPath: /var/data
      sizeGB: 5
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.9
      - key: APP_ENV
        value: production
      - key: APP_VERSION
        value: v1.6.1
      - key: BUILD_ID
        value: v1.6.1-outcome-timestamp-hotfix
      - key: BUILD_TIMESTAMP_UTC
        value: 2026-05-09T16:35:00+00:00
      - key: ARTIFACT_SCHEMA_VERSION
        value: 2026-05-09-v1
      - key: DATA_DIR
        value: /var/data
      - key: DATABASE_PATH
        value: /var/data/scanner.db
      - key: ARTIFACTS_DIR
        value: /var/data/artifacts
      - key: SETTINGS_PATH
        value: /var/data/settings.json
      - key: RUNTIME_STATUS_PATH
        value: /var/data/runtime_status.json
      - key: UNIVERSE_CACHE_PATH
        value: /var/data/universe_cache.json
      - key: DATA_PROVIDER
        value: yfinance
      - key: DEMO_MODE
        value: false
      - key: SCAN_TICKER_LIMIT
        value: 500
      - key: ENRICHMENT_LIMIT
        value: 120
      - key: SHORTLIST_SIZE
        value: 20
      - key: LOOKBACK_DAYS
        value: 320
      - key: NEWS_LOOKBACK_DAYS
        value: 7
      - key: MAX_WORKERS
        value: 8
      - key: STRUCTURAL_WEIGHT
        value: 0.35
      - key: CATALYST_WEIGHT
        value: 0.30
      - key: TIMING_WEIGHT
        value: 0.35
      - key: YFINANCE_BULK_CHUNK_SIZE
        value: 100

      - key: STALE_PRICE_MAX_AGE_DAYS
        value: 3
      - key: STALE_NEWS_MAX_AGE_DAYS
        value: 7
      - key: MIN_CORE_FEATURE_COVERAGE_PCT
        value: 70
      - key: MIN_PRICE_HISTORY_COVERAGE_PCT
        value: 90
      - key: OUTCOME_TARGET_UP_PCT
        value: 0.05
      - key: OUTCOME_STOP_DOWN_PCT
        value: 0.03
      - key: OUTCOME_HORIZON_DAYS
        value: 20
      - key: OUTCOME_RECHECK_LOOKBACK_DAYS
        value: 80
